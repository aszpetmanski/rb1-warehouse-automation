controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    failure_tolerance: 0.3
    odom_topic: /diffbot_base_controller/odom

    # Velocity thresholds
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.000
    min_theta_velocity_threshold: 0.001

    # Plugins
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.02
      movement_time_allowance: 30.0

    # Goal checker
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: True
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.13

    # DWB local planner
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      stateful: True
      short_circuit_trajectory_evaluation: True

      # Velocity limits
      min_vel_x: 0.0
      max_vel_x: 0.26
      min_vel_y: 0.0
      max_vel_y: 0.0
      max_vel_theta: 0.5

      min_speed_xy: 0.0
      max_speed_xy: 0.26
      min_speed_theta: 0.0
      trans_stopped_velocity: 0.02

      # Acceleration limits
      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2

      # Sampling
      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 20
      sim_time: 1.7

      # Trajectory evaluation
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.10

      # Critics
      critics: ["RotateToGoal", "Oscillation", "GoalAlign", "BaseObstacle", "PathAlign", "PathDist", "GoalDist"]

      BaseObstacle.scale: 2.0

      PathAlign.scale: 8.0
      PathAlign.forward_point_distance: 0.1

      GoalAlign.scale: 18.0
      GoalAlign.forward_point_distance: 0.1

      PathDist.scale: 4.0
      GoalDist.scale: 12.0

      RotateToGoal.scale: 16.0
      RotateToGoal.slowing_factor: 8.0
      RotateToGoal.lookahead_time: -1.0


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True

      # Frames
      global_frame: odom
      robot_base_frame: robot_base_footprint

      # Update settings
      update_frequency: 5.0
      publish_frequency: 2.0
      always_send_full_costmap: True

      # Costmap geometry
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      robot_radius: 0.27

      # Layers
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan

        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: True
          clearing: True
          max_obstacle_height: 2.0
          obstacle_max_range: 15.0
          obstacle_min_range: 0.1
          raytrace_max_range: 15.0
          raytrace_min_range: 0.1

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 0.34