amcl:
  ros__parameters:
    use_sim_time: False

    # Frames and topics
    base_frame_id: "robot_base_footprint"
    odom_frame_id: "robot_odom"
    global_frame_id: "map"
    scan_topic: "/scan"

    # Motion model
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    # Laser model
    laser_model_type: "likelihood_field"
    laser_max_range: -1.0
    laser_min_range: -1.0
    laser_likelihood_max_dist: 2.0
    lambda_short: 0.1
    sigma_hit: 0.2
    z_hit: 0.6
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.4
    max_beams: 120

    # Beam skipping
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9

    # Particle filter
    min_particles: 4000
    max_particles: 20000
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1
    recovery_alpha_fast: 0.1
    recovery_alpha_slow: 0.001

    # Update thresholds
    update_min_a: 0.2
    update_min_d: 0.25

    # TF
    tf_broadcast: true
    transform_tolerance: 1.0

    # Initial pose behavior
    set_initial_pose: false
    always_reset_initial_pose: false
    save_pose_rate: -1.0